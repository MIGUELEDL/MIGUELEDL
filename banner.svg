<svg width="1200" height="300"
xmlns="http://www.w3.org/2000/svg">

<defs>

<radialGradient id="bg">
<stop offset="0%" stop-color="#1b1b1b"/>
<stop offset="100%" stop-color="#050505"/>
</radialGradient>

</defs>

<rect width="100%" height="100%"
fill="url(#bg)"/>

<!-- PYTHON -->

<image
href="assets/python.png"
x="450"
y="50"
width="300"
height="200">

<animate
attributeName="opacity"
values="1;1;0;0;0;0;0;0"
dur="16s"
repeatCount="indefinite"/>

</image>

<!-- AWS -->

<image
href="assets/aws.png"
x="450"
y="50"
width="300"
height="200"
opacity="0">

<animate
attributeName="opacity"
values="0;0;1;1;0;0;0;0"
dur="16s"
repeatCount="indefinite"/>

</image>

<!-- VSCODE -->

<image
href="assets/vscode.png"
x="450"
y="50"
width="300"
height="200"
opacity="0">

<animate
attributeName="opacity"
values="0;0;0;0;1;1;0;0"
dur="16s"
repeatCount="indefinite"/>

</image>

</svg>
